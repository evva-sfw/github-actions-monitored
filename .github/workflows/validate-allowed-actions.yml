name: Validate allowed-actions.json

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate JSON syntax
        run: jq . .github/allowed-actions.json > /dev/null
      - name: 'Check Order: Repo ASC'
        run: jq '.include | . == (sort_by(.repo| ascii_downcase))' .github/allowed-actions.json
